{% extends "base.html" %}

{% block title %}SecureNet - Log Ingestion{% endblock %}

{% block content %}
<div class="page-header">
    <h1 class="page-title">
        <i class="fas fa-database"></i>
        Log Ingestion
    </h1>
    <div class="header-actions">
        <button class="button button-primary" onclick="addLogSource()">
            <i class="fas fa-plus"></i>
            Add Log Source
        </button>
    </div>
</div>

<!-- Log Sources -->
<div class="card">
    <div class="card-header">
        <h2 class="card-title">
            <i class="fas fa-list"></i>
            Log Sources
        </h2>
        <div class="card-actions">
            <button class="button" onclick="refreshLogSources()">
                <i class="fas fa-sync-alt"></i>
                Refresh
            </button>
        </div>
    </div>
    <div class="table-responsive">
        <table class="table">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Type</th>
                    <th>Status</th>
                    <th>Last Update</th>
                    <th>Logs/Min</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="log-sources">
                <!-- Filled by JavaScript -->
            </tbody>
        </table>
    </div>
</div>

<!-- Live Log Feed -->
<div class="card">
    <div class="card-header">
        <h2 class="card-title">
            <i class="fas fa-stream"></i>
            Live Log Feed
        </h2>
        <div class="card-actions">
            <div class="input-group" style="width: 300px;">
                <input type="text" class="form-control" id="log-filter" placeholder="Filter logs...">
                <button class="button" onclick="clearLogFilter()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <button class="button" onclick="clearLogFeed()">
                <i class="fas fa-trash"></i>
                Clear
            </button>
            <button class="button" onclick="toggleLogFeed()">
                <i class="fas fa-pause" id="feed-toggle-icon"></i>
                <span id="feed-toggle-text">Pause</span>
            </button>
        </div>
    </div>
    <div class="log-feed" id="log-feed">
        <!-- Filled by JavaScript -->
    </div>
</div>

<!-- Log Source Modal -->
<div class="modal fade" id="logSourceModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="logSourceModalTitle">
                    <i class="fas fa-plus"></i>
                    Add Log Source
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="logSourceForm">
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Source Name</label>
                            <input type="text" class="form-control" id="sourceName" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Source Type</label>
                            <select class="form-select" id="sourceType" required>
                                <option value="">Select type...</option>
                                <option value="syslog">Syslog</option>
                                <option value="file">File</option>
                                <option value="api">API</option>
                                <option value="database">Database</option>
                            </select>
                        </div>
                    </div>

                    <!-- Syslog Configuration -->
                    <div class="source-config" id="syslogConfig" style="display: none;">
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label">Host</label>
                                <input type="text" class="form-control" id="syslogHost">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Port</label>
                                <input type="number" class="form-control" id="syslogPort" value="514">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Protocol</label>
                            <select class="form-select" id="syslogProtocol">
                                <option value="udp">UDP</option>
                                <option value="tcp">TCP</option>
                            </select>
                        </div>
                    </div>

                    <!-- File Configuration -->
                    <div class="source-config" id="fileConfig" style="display: none;">
                        <div class="mb-3">
                            <label class="form-label">File Path</label>
                            <input type="text" class="form-control" id="filePath">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">File Pattern</label>
                            <input type="text" class="form-control" id="filePattern" placeholder="*.log">
                        </div>
                        <div class="mb-3">
                            <div class="form-check">
                                <input type="checkbox" class="form-check-input" id="fileRecursive">
                                <label class="form-check-label">Monitor subdirectories</label>
                            </div>
                        </div>
                    </div>

                    <!-- API Configuration -->
                    <div class="source-config" id="apiConfig" style="display: none;">
                        <div class="mb-3">
                            <label class="form-label">API Endpoint</label>
                            <input type="url" class="form-control" id="apiEndpoint">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Authentication</label>
                            <select class="form-select" id="apiAuth">
                                <option value="none">None</option>
                                <option value="basic">Basic Auth</option>
                                <option value="token">API Token</option>
                            </select>
                        </div>
                        <div class="api-auth-config" id="basicAuthConfig" style="display: none;">
                            <div class="row">
                                <div class="col-md-6">
                                    <label class="form-label">Username</label>
                                    <input type="text" class="form-control" id="apiUsername">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Password</label>
                                    <input type="password" class="form-control" id="apiPassword">
                                </div>
                            </div>
                        </div>
                        <div class="api-auth-config" id="tokenAuthConfig" style="display: none;">
                            <div class="mb-3">
                                <label class="form-label">API Token</label>
                                <input type="text" class="form-control" id="apiToken">
                            </div>
                        </div>
                    </div>

                    <!-- Database Configuration -->
                    <div class="source-config" id="databaseConfig" style="display: none;">
                        <div class="mb-3">
                            <label class="form-label">Database Type</label>
                            <select class="form-select" id="dbType">
                                <option value="mysql">MySQL</option>
                                <option value="postgresql">PostgreSQL</option>
                                <option value="mongodb">MongoDB</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Connection String</label>
                            <input type="text" class="form-control" id="dbConnection">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Query</label>
                            <textarea class="form-control" id="dbQuery" rows="3"></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Polling Interval (seconds)</label>
                            <input type="number" class="form-control" id="dbInterval" value="60">
                        </div>
                    </div>

                    <!-- Common Configuration -->
                    <div class="mb-3">
                        <label class="form-label">Log Format</label>
                        <select class="form-select" id="logFormat">
                            <option value="auto">Auto-detect</option>
                            <option value="json">JSON</option>
                            <option value="syslog">Syslog</option>
                            <option value="csv">CSV</option>
                            <option value="custom">Custom</option>
                        </select>
                    </div>
                    <div class="mb-3" id="customFormatConfig" style="display: none;">
                        <label class="form-label">Custom Format Pattern</label>
                        <input type="text" class="form-control" id="customFormat" placeholder="%timestamp% %level% %message%">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Tags</label>
                        <input type="text" class="form-control" id="sourceTags" placeholder="comma-separated tags">
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="button" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="button button-primary" onclick="saveLogSource()">Save</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_css %}
<style>
    .log-feed {
        height: 500px;
        overflow-y: auto;
        background: var(--neutral-900);
        color: var(--neutral-100);
        font-family: 'JetBrains Mono', monospace;
        padding: 1rem;
        border-radius: var(--radius);
    }

    .log-entry {
        margin: 0.25rem 0;
        padding: 0.5rem;
        border-radius: var(--radius-sm);
        font-size: 0.875rem;
        line-height: 1.5;
        display: flex;
        align-items: flex-start;
        gap: 0.5rem;
    }

    .log-entry:hover {
        background: rgba(255, 255, 255, 0.1);
    }

    .log-timestamp {
        color: var(--neutral-400);
        flex-shrink: 0;
    }

    .log-level {
        font-weight: 600;
        flex-shrink: 0;
        width: 4rem;
        text-align: center;
    }

    .log-level.info { color: #60a5fa; }
    .log-level.warning { color: #fbbf24; }
    .log-level.error { color: #f87171; }
    .log-level.debug { color: #a3a3a3; }

    .log-source {
        color: var(--neutral-400);
        flex-shrink: 0;
        width: 8rem;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
    }

    .log-message {
        flex: 1;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    .log-entry.expanded .log-message {
        white-space: pre-wrap;
        overflow: visible;
    }

    .source-status {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.25rem 0.5rem;
        border-radius: var(--radius-sm);
        font-size: 0.875rem;
        font-weight: 500;
    }

    .source-status.active {
        background: #dcfce7;
        color: var(--success-color);
    }

    .source-status.inactive {
        background: #fee2e2;
        color: var(--danger-color);
    }

    .source-status.warning {
        background: #fef3c7;
        color: var(--warning-color);
    }

    .source-actions {
        display: flex;
        gap: 0.5rem;
    }

    .source-actions button {
        padding: 0.25rem 0.5rem;
        font-size: 0.875rem;
    }

    .form-label {
        font-weight: 500;
        color: var(--neutral-700);
    }

    .form-control, .form-select {
        border-color: var(--neutral-300);
    }

    .form-control:focus, .form-select:focus {
        border-color: var(--primary-color);
        box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.1);
    }
</style>
{% endblock %}

{% block extra_js %}
<script>
    let logFeedActive = true;
    let logFilter = '';
    let logSources = [];

    // Initialize page
    function initializePage() {
        refreshLogSources();
        setupLogSourceTypeHandlers();
        setupLogFormatHandlers();
        setupApiAuthHandlers();
    }

    // Set up event handlers for log source type selection
    function setupLogSourceTypeHandlers() {
        document.getElementById('sourceType').addEventListener('change', function(e) {
            // Hide all config sections
            document.querySelectorAll('.source-config').forEach(el => el.style.display = 'none');
            
            // Show selected config
            const selectedType = e.target.value;
            if (selectedType) {
                document.getElementById(`${selectedType}Config`).style.display = 'block';
            }
        });
    }

    // Set up event handlers for log format selection
    function setupLogFormatHandlers() {
        document.getElementById('logFormat').addEventListener('change', function(e) {
            const customConfig = document.getElementById('customFormatConfig');
            customConfig.style.display = e.target.value === 'custom' ? 'block' : 'none';
        });
    }

    // Set up event handlers for API auth selection
    function setupApiAuthHandlers() {
        document.getElementById('apiAuth').addEventListener('change', function(e) {
            // Hide all auth config sections
            document.querySelectorAll('.api-auth-config').forEach(el => el.style.display = 'none');
            
            // Show selected auth config
            const selectedAuth = e.target.value;
            if (selectedAuth !== 'none') {
                document.getElementById(`${selectedAuth}Config`).style.display = 'block';
            }
        });
    }

    // Refresh log sources
    async function refreshLogSources() {
        try {
            const response = await fetch('/api/logs/sources', {
                headers: {
                    'X-API-Key': '{{ api_key }}'
                }
            });
            
            if (!response.ok) throw new Error('Failed to fetch log sources');
            
            logSources = await response.json();
            const tbody = document.getElementById('log-sources');
            tbody.innerHTML = '';
            
            if (logSources.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="6" class="text-center text-muted">
                            No log sources configured
                        </td>
                    </tr>
                `;
                return;
            }
            
            logSources.forEach(source => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${source.name}</td>
                    <td>${source.type}</td>
                    <td>
                        <span class="source-status ${source.status}">
                            <i class="fas fa-circle"></i>
                            ${source.status}
                        </span>
                    </td>
                    <td>${new Date(source.last_update).toLocaleString()}</td>
                    <td>${source.logs_per_minute}</td>
                    <td>
                        <div class="source-actions">
                            <button class="button" onclick="editLogSource('${source.id}')">
                                <i class="fas fa-edit"></i>
                            </button>
                            <button class="button" onclick="toggleLogSource('${source.id}')">
                                <i class="fas fa-${source.status === 'active' ? 'pause' : 'play'}"></i>
                            </button>
                            <button class="button button-danger" onclick="deleteLogSource('${source.id}')">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        } catch (error) {
            console.error('Error refreshing log sources:', error);
            showNotification({
                title: 'Data Load Error',
                message: 'Failed to load log sources',
                level: 'error'
            });
        }
    }

    // Add log source
    function addLogSource() {
        document.getElementById('logSourceModalTitle').innerHTML = `
            <i class="fas fa-plus"></i>
            Add Log Source
        `;
        document.getElementById('logSourceForm').reset();
        document.querySelectorAll('.source-config').forEach(el => el.style.display = 'none');
        document.getElementById('customFormatConfig').style.display = 'none';
        document.querySelectorAll('.api-auth-config').forEach(el => el.style.display = 'none');
        
        const modal = new bootstrap.Modal(document.getElementById('logSourceModal'));
        modal.show();
    }

    // Edit log source
    async function editLogSource(sourceId) {
        try {
            const response = await fetch(`/api/logs/sources/${sourceId}`, {
                headers: {
                    'X-API-Key': '{{ api_key }}'
                }
            });
            
            if (!response.ok) throw new Error('Failed to fetch log source details');
            
            const source = await response.json();
            
            // Fill form
            document.getElementById('sourceName').value = source.name;
            document.getElementById('sourceType').value = source.type;
            document.getElementById('logFormat').value = source.format;
            
            // Show appropriate config section
            document.querySelectorAll('.source-config').forEach(el => el.style.display = 'none');
            document.getElementById(`${source.type}Config`).style.display = 'block';
            
            // Fill type-specific fields
            if (source.type === 'syslog') {
                document.getElementById('syslogHost').value = source.config.host;
                document.getElementById('syslogPort').value = source.config.port;
                document.getElementById('syslogProtocol').value = source.config.protocol;
            } else if (source.type === 'file') {
                document.getElementById('filePath').value = source.config.path;
                document.getElementById('filePattern').value = source.config.pattern;
                document.getElementById('fileRecursive').checked = source.config.recursive;
            } else if (source.type === 'api') {
                document.getElementById('apiEndpoint').value = source.config.endpoint;
                document.getElementById('apiAuth').value = source.config.auth.type;
                if (source.config.auth.type === 'basic') {
                    document.getElementById('apiUsername').value = source.config.auth.username;
                    document.getElementById('apiPassword').value = source.config.auth.password;
                } else if (source.config.auth.type === 'token') {
                    document.getElementById('apiToken').value = source.config.auth.token;
                }
            } else if (source.type === 'database') {
                document.getElementById('dbType').value = source.config.type;
                document.getElementById('dbConnection').value = source.config.connection;
                document.getElementById('dbQuery').value = source.config.query;
                document.getElementById('dbInterval').value = source.config.interval;
            }
            
            // Show custom format if needed
            if (source.format === 'custom') {
                document.getElementById('customFormatConfig').style.display = 'block';
                document.getElementById('customFormat').value = source.format_pattern;
            }
            
            // Show API auth config if needed
            if (source.type === 'api' && source.config.auth.type !== 'none') {
                document.getElementById(`${source.config.auth.type}Config`).style.display = 'block';
            }
            
            document.getElementById('sourceTags').value = source.tags.join(', ');
            
            document.getElementById('logSourceModalTitle').innerHTML = `
                <i class="fas fa-edit"></i>
                Edit Log Source
            `;
            
            const modal = new bootstrap.Modal(document.getElementById('logSourceModal'));
            modal.show();
        } catch (error) {
            console.error('Error editing log source:', error);
            showNotification({
                title: 'Error',
                message: 'Failed to load log source details',
                level: 'error'
            });
        }
    }

    // Save log source
    async function saveLogSource() {
        const form = document.getElementById('logSourceForm');
        if (!form.checkValidity()) {
            form.reportValidity();
            return;
        }
        
        const sourceType = document.getElementById('sourceType').value;
        const config = {};
        
        // Get type-specific configuration
        if (sourceType === 'syslog') {
            config.host = document.getElementById('syslogHost').value;
            config.port = parseInt(document.getElementById('syslogPort').value);
            config.protocol = document.getElementById('syslogProtocol').value;
        } else if (sourceType === 'file') {
            config.path = document.getElementById('filePath').value;
            config.pattern = document.getElementById('filePattern').value;
            config.recursive = document.getElementById('fileRecursive').checked;
        } else if (sourceType === 'api') {
            config.endpoint = document.getElementById('apiEndpoint').value;
            config.auth = {
                type: document.getElementById('apiAuth').value
            };
            if (config.auth.type === 'basic') {
                config.auth.username = document.getElementById('apiUsername').value;
                config.auth.password = document.getElementById('apiPassword').value;
            } else if (config.auth.type === 'token') {
                config.auth.token = document.getElementById('apiToken').value;
            }
        } else if (sourceType === 'database') {
            config.type = document.getElementById('dbType').value;
            config.connection = document.getElementById('dbConnection').value;
            config.query = document.getElementById('dbQuery').value;
            config.interval = parseInt(document.getElementById('dbInterval').value);
        }
        
        const source = {
            name: document.getElementById('sourceName').value,
            type: sourceType,
            config: config,
            format: document.getElementById('logFormat').value,
            tags: document.getElementById('sourceTags').value.split(',').map(tag => tag.trim()).filter(tag => tag)
        };
        
        if (source.format === 'custom') {
            source.format_pattern = document.getElementById('customFormat').value;
        }
        
        try {
            const response = await fetch('/api/logs/sources', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-API-Key': '{{ api_key }}'
                },
                body: JSON.stringify(source)
            });
            
            if (!response.ok) {
                const error = await response.json();
                throw new Error(error.detail || 'Failed to save log source');
            }
            
            bootstrap.Modal.getInstance(document.getElementById('logSourceModal')).hide();
            refreshLogSources();
            
            showNotification({
                title: 'Success',
                message: 'Log source saved successfully',
                level: 'success'
            });
        } catch (error) {
            console.error('Error saving log source:', error);
            showNotification({
                title: 'Error',
                message: error.message,
                level: 'error'
            });
        }
    }

    // Toggle log source
    async function toggleLogSource(sourceId) {
        const source = logSources.find(s => s.id === sourceId);
        if (!source) return;
        
        try {
            const response = await fetch(`/api/logs/sources/${sourceId}/toggle`, {
                method: 'POST',
                headers: {
                    'X-API-Key': '{{ api_key }}'
                }
            });
            
            if (!response.ok) {
                const error = await response.json();
                throw new Error(error.detail || 'Failed to toggle log source');
            }
            
            refreshLogSources();
            
            showNotification({
                title: 'Success',
                message: `Log source ${source.status === 'active' ? 'paused' : 'activated'}`,
                level: 'success'
            });
        } catch (error) {
            console.error('Error toggling log source:', error);
            showNotification({
                title: 'Error',
                message: error.message,
                level: 'error'
            });
        }
    }

    // Delete log source
    async function deleteLogSource(sourceId) {
        if (!confirm('Are you sure you want to delete this log source?')) return;
        
        try {
            const response = await fetch(`/api/logs/sources/${sourceId}`, {
                method: 'DELETE',
                headers: {
                    'X-API-Key': '{{ api_key }}'
                }
            });
            
            if (!response.ok) {
                const error = await response.json();
                throw new Error(error.detail || 'Failed to delete log source');
            }
            
            refreshLogSources();
            
            showNotification({
                title: 'Success',
                message: 'Log source deleted successfully',
                level: 'success'
            });
        } catch (error) {
            console.error('Error deleting log source:', error);
            showNotification({
                title: 'Error',
                message: error.message,
                level: 'error'
            });
        }
    }

    // Toggle log feed
    function toggleLogFeed() {
        logFeedActive = !logFeedActive;
        const icon = document.getElementById('feed-toggle-icon');
        const text = document.getElementById('feed-toggle-text');
        
        if (logFeedActive) {
            icon.className = 'fas fa-pause';
            text.textContent = 'Pause';
        } else {
            icon.className = 'fas fa-play';
            text.textContent = 'Resume';
        }
    }

    // Clear log feed
    function clearLogFeed() {
        document.getElementById('log-feed').innerHTML = '';
    }

    // Filter logs
    document.getElementById('log-filter').addEventListener('input', function(e) {
        logFilter = e.target.value.toLowerCase();
        const entries = document.querySelectorAll('.log-entry');
        
        entries.forEach(entry => {
            const message = entry.querySelector('.log-message').textContent.toLowerCase();
            entry.style.display = message.includes(logFilter) ? 'flex' : 'none';
        });
    });

    // Clear log filter
    function clearLogFilter() {
        document.getElementById('log-filter').value = '';
        logFilter = '';
        document.querySelectorAll('.log-entry').forEach(entry => {
            entry.style.display = 'flex';
        });
    }

    // Handle WebSocket messages
    function handleWebSocketMessage(data) {
        if (data.type === 'log' && logFeedActive) {
            const feed = document.getElementById('log-feed');
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            
            entry.innerHTML = `
                <span class="log-timestamp">${new Date(data.timestamp).toLocaleTimeString()}</span>
                <span class="log-level ${data.level.toLowerCase()}">${data.level}</span>
                <span class="log-source">${data.source}</span>
                <span class="log-message">${data.message}</span>
            `;
            
            entry.addEventListener('click', function() {
                this.classList.toggle('expanded');
            });
            
            if (!logFilter || data.message.toLowerCase().includes(logFilter)) {
                feed.insertBefore(entry, feed.firstChild);
            }
            
            // Limit entries
            while (feed.children.length > 1000) {
                feed.removeChild(feed.lastChild);
            }
        }
    }
</script>
{% endblock %}

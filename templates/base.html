<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SecureNet{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #2563eb;
            --primary-hover: #1d4ed8;
            --success-color: #059669;
            --success-hover: #047857;
            --danger-color: #dc2626;
            --danger-hover: #b91c1c;
            --warning-color: #d97706;
            --warning-hover: #b45309;
            --neutral-50: #f9fafb;
            --neutral-100: #f3f4f6;
            --neutral-200: #e5e7eb;
            --neutral-300: #d1d5db;
            --neutral-400: #9ca3af;
            --neutral-500: #6b7280;
            --neutral-600: #4b5563;
            --neutral-700: #374151;
            --neutral-800: #1f2937;
            --neutral-900: #111827;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
            --radius-sm: 0.375rem;
            --radius: 0.5rem;
            --radius-lg: 0.75rem;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--neutral-100);
            color: var(--neutral-800);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
            display: flex;
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background: white;
            border-right: 1px solid var(--neutral-200);
            padding: 1.5rem;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
        }

        .sidebar-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding-bottom: 1.5rem;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid var(--neutral-200);
        }

        .sidebar-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--neutral-900);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .sidebar-title i {
            color: var(--primary-color);
        }

        .nav-item {
            margin-bottom: 0.5rem;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1rem;
            color: var(--neutral-600);
            text-decoration: none;
            border-radius: var(--radius);
            transition: all 0.2s ease;
        }

        .nav-link:hover {
            background: var(--neutral-100);
            color: var(--neutral-900);
        }

        .nav-link.active {
            background: var(--primary-color);
            color: white;
        }

        .nav-link i {
            width: 1.25rem;
            text-align: center;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            margin-left: 280px;
            padding: 2rem;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--neutral-200);
        }

        .page-title {
            font-size: 1.875rem;
            font-weight: 700;
            color: var(--neutral-900);
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .page-title i {
            color: var(--primary-color);
        }

        /* Cards */
        .card {
            background: white;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .card-title {
            font-size: 1.125rem;
            font-weight: 600;
            color: var(--neutral-800);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* Status Indicators */
        .status-indicator {
            display: inline-block;
            width: 0.75rem;
            height: 0.75rem;
            border-radius: 50%;
            position: relative;
        }

        .status-indicator::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                opacity: 1;
            }
            100% {
                transform: scale(2);
                opacity: 0;
            }
        }

        .status-running { 
            background-color: var(--success-color);
        }
        .status-running::after {
            background-color: var(--success-color);
        }
        .status-stopped { 
            background-color: var(--danger-color);
        }
        .status-stopped::after {
            background-color: var(--danger-color);
        }

        /* Buttons */
        .button {
            padding: 0.625rem 1.25rem;
            border: none;
            border-radius: var(--radius);
            font-weight: 500;
            font-size: 0.875rem;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .button i {
            font-size: 0.875rem;
        }

        .button-primary {
            background-color: var(--primary-color);
            color: white;
        }
        .button-primary:hover {
            background-color: var(--primary-hover);
        }

        .button-success {
            background-color: var(--success-color);
            color: white;
        }
        .button-success:hover {
            background-color: var(--success-hover);
        }

        .button-danger {
            background-color: var(--danger-color);
            color: white;
        }
        .button-danger:hover {
            background-color: var(--danger-hover);
        }

        .button:disabled {
            background-color: var(--neutral-300);
            cursor: not-allowed;
            opacity: 0.7;
        }

        /* Toast Container */
        .toast-container {
            position: fixed;
            bottom: 1rem;
            right: 1rem;
            z-index: 1000;
        }

        /* Responsive Design */
        @media (max-width: 1024px) {
            .sidebar {
                width: 240px;
            }
            .main-content {
                margin-left: 240px;
            }
        }

        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
                transition: transform 0.3s ease;
                z-index: 1000;
            }
            .sidebar.show {
                transform: translateX(0);
            }
            .main-content {
                margin-left: 0;
            }
            .mobile-menu-button {
                display: block;
            }
        }

        /* Mobile Menu Button */
        .mobile-menu-button {
            display: none;
            position: fixed;
            top: 1rem;
            left: 1rem;
            z-index: 1001;
            background: white;
            border: none;
            border-radius: var(--radius);
            padding: 0.5rem;
            box-shadow: var(--shadow);
            cursor: pointer;
        }

        .mobile-menu-button i {
            font-size: 1.25rem;
            color: var(--neutral-700);
        }

        /* Overlay for mobile menu */
        .sidebar-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 999;
        }

        .sidebar-overlay.show {
            display: block;
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <!-- Mobile Menu Button -->
    <button class="mobile-menu-button" onclick="toggleSidebar()">
        <i class="fas fa-bars"></i>
    </button>

    <!-- Sidebar Overlay -->
    <div class="sidebar-overlay" onclick="toggleSidebar()"></div>

    <!-- Sidebar -->
    <nav class="sidebar">
        <div class="sidebar-header">
            <h1 class="sidebar-title">
                <i class="fas fa-shield-alt"></i>
                SecureNet
            </h1>
        </div>
        <ul class="nav">
            <li class="nav-item">
                <a href="/" class="nav-link {% if request.url.path == '/' %}active{% endif %}">
                    <i class="fas fa-home"></i>
                    Dashboard
                </a>
            </li>
            <li class="nav-item">
                <a href="/logs" class="nav-link {% if request.url.path == '/logs' %}active{% endif %}">
                    <i class="fas fa-database"></i>
                    Log Ingestion
                </a>
            </li>
            <li class="nav-item">
                <a href="/anomalies" class="nav-link {% if request.url.path == '/anomalies' %}active{% endif %}">
                    <i class="fas fa-radar"></i>
                    Anomaly Detection
                </a>
            </li>
            <li class="nav-item">
                <a href="/network" class="nav-link {% if request.url.path == '/network' %}active{% endif %}">
                    <i class="fas fa-network-wired"></i>
                    Network Scanner
                </a>
            </li>
            <li class="nav-item">
                <a href="/settings" class="nav-link {% if request.url.path == '/settings' %}active{% endif %}">
                    <i class="fas fa-cog"></i>
                    Settings
                </a>
            </li>
        </ul>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <!-- Toast Container -->
    <div class="toast-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Mobile sidebar toggle
        function toggleSidebar() {
            document.querySelector('.sidebar').classList.toggle('show');
            document.querySelector('.sidebar-overlay').classList.toggle('show');
        }

        // Global state management
        const state = {
            services: {
                ingestion: { running: false, stats: null },
                detection: { running: false, stats: null },
                alerts: { running: false, stats: null },
                scanner: { running: false, stats: null }
            },
            ws: null,
            wsReconnectAttempts: 0,
            maxReconnectAttempts: 5,
            reconnectDelay: 1000,
            apiKey: '{{ api_key }}'  // Get API key from template
        };

        // WebSocket management
        function initializeWebSocket() {
            if (state.ws) {
                state.ws.close();
            }

            // Ensure API key is available
            if (!state.apiKey) {
                showNotification({
                    title: 'Authentication Error',
                    message: 'API key is required for WebSocket connection',
                    level: 'error'
                });
                return;
            }

            // Create WebSocket connection with API key in query parameters
            const wsUrl = `ws://${window.location.host}/ws/logs?api_key=${encodeURIComponent(state.apiKey)}`;
            state.ws = new WebSocket(wsUrl);
            
            // Set up ping interval for connection health check
            let pingInterval;
            
            state.ws.onopen = function() {
                console.log('WebSocket connected');
                state.wsReconnectAttempts = 0;
                
                // Start ping interval
                pingInterval = setInterval(() => {
                    if (state.ws.readyState === WebSocket.OPEN) {
                        state.ws.send('ping');
                    }
                }, 30000); // Send ping every 30 seconds
                
                showNotification({
                    title: 'Connection Established',
                    message: 'Real-time updates are now active',
                    level: 'success'
                });
            };

            state.ws.onmessage = function(event) {
                try {
                    // Handle pong response
                    if (event.data === 'pong') {
                        return;
                    }
                    
                    const data = JSON.parse(event.data);
                    if (data.type === 'notification') {
                        showNotification(data);
                    }
                    // Handle other message types in specific pages
                    if (typeof handleWebSocketMessage === 'function') {
                        handleWebSocketMessage(data);
                    }
                } catch (error) {
                    console.error('Error processing WebSocket message:', error);
                }
            };

            state.ws.onerror = function(error) {
                console.error('WebSocket error:', error);
                showNotification({
                    title: 'Connection Error',
                    message: 'Failed to establish real-time connection',
                    level: 'error'
                });
            };

            state.ws.onclose = function(event) {
                // Clear ping interval
                if (pingInterval) {
                    clearInterval(pingInterval);
                }
                
                console.log('WebSocket disconnected:', event.code, event.reason);
                
                // Handle specific close codes
                if (event.code === 1006) {
                    showNotification({
                        title: 'Connection Lost',
                        message: 'Connection was unexpectedly closed',
                        level: 'error'
                    });
                } else if (event.code === 4003) {
                    showNotification({
                        title: 'Authentication Failed',
                        message: event.reason || 'Invalid API key',
                        level: 'error'
                    });
                } else if (state.wsReconnectAttempts < state.maxReconnectAttempts) {
                    state.wsReconnectAttempts++;
                    const delay = state.reconnectDelay * Math.pow(2, state.wsReconnectAttempts - 1);
                    setTimeout(initializeWebSocket, delay);
                    showNotification({
                        title: 'Connection Lost',
                        message: `Attempting to reconnect (${state.wsReconnectAttempts}/${state.maxReconnectAttempts})...`,
                        level: 'warning'
                    });
                } else {
                    showNotification({
                        title: 'Connection Failed',
                        message: 'Please refresh the page to reconnect',
                        level: 'error'
                    });
                }
            };
        }

        // Notification system
        function showNotification(notification) {
            const toast = document.createElement('div');
            toast.className = `toast align-items-center text-white bg-${notification.level === 'error' ? 'danger' : notification.level === 'warning' ? 'warning' : 'success'} border-0`;
            toast.setAttribute('role', 'alert');
            toast.setAttribute('aria-live', 'assertive');
            toast.setAttribute('aria-atomic', 'true');
            
            toast.innerHTML = `
                <div class="d-flex">
                    <div class="toast-body">
                        <strong>${notification.title}</strong><br>
                        ${notification.message}
                    </div>
                    <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
                </div>
            `;
            
            const container = document.querySelector('.toast-container');
            container.appendChild(toast);
            const bsToast = new bootstrap.Toast(toast, { delay: 5000 });
            bsToast.show();
            
            toast.addEventListener('hidden.bs.toast', () => {
                toast.remove();
            });
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            initializeWebSocket();
            // Initialize page-specific functionality
            if (typeof initializePage === 'function') {
                initializePage();
            }
        });
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>

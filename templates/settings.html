{% extends "base.html" %}

{% block title %}Settings - SecureNet{% endblock %}

{% block content %}
<div class="page-header">
    <h1 class="page-title">
        <i class="fas fa-cog"></i>
        System Settings
    </h1>
    <div class="header-actions">
        <button class="btn btn-primary" onclick="saveSettings()">
            <i class="fas fa-save"></i>
            Save Changes
        </button>
    </div>
</div>

<div class="row">
    <!-- General Settings -->
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h2 class="card-title">
                    <i class="fas fa-sliders-h"></i>
                    General Settings
                </h2>
            </div>
            <div class="card-body">
                <form id="general-settings">
                    <div class="mb-3">
                        <label for="system-name" class="form-label">System Name</label>
                        <input type="text" class="form-control" id="system-name" name="system_name" value="{{ settings.system_name }}">
                    </div>
                    <div class="mb-3">
                        <label for="timezone" class="form-label">Timezone</label>
                        <select class="form-select" id="timezone" name="timezone">
                            {% for tz in timezones %}
                            <option value="{{ tz }}" {% if tz == settings.timezone %}selected{% endif %}>{{ tz }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="log-retention" class="form-label">Log Retention (days)</label>
                        <input type="number" class="form-control" id="log-retention" name="log_retention" value="{{ settings.log_retention }}" min="1" max="365">
                    </div>
                    <div class="mb-3">
                        <div class="form-check form-switch">
                            <input class="form-check-input" type="checkbox" id="debug-mode" name="debug_mode" {% if settings.debug_mode %}checked{% endif %}>
                            <label class="form-check-label" for="debug-mode">Debug Mode</label>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Security Settings -->
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h2 class="card-title">
                    <i class="fas fa-shield-alt"></i>
                    Security Settings
                </h2>
            </div>
            <div class="card-body">
                <form id="security-settings">
                    <div class="mb-3">
                        <label for="api-key" class="form-label">API Key</label>
                        <div class="input-group">
                            <input type="password" class="form-control" id="api-key" value="{{ settings.api_key }}" readonly>
                            <button class="btn btn-outline-secondary" type="button" onclick="regenerateApiKey()">
                                <i class="fas fa-sync-alt"></i>
                                Regenerate
                            </button>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="session-timeout" class="form-label">Session Timeout (minutes)</label>
                        <input type="number" class="form-control" id="session-timeout" name="session_timeout" value="{{ settings.session_timeout }}" min="5" max="1440">
                    </div>
                    <div class="mb-3">
                        <div class="form-check form-switch">
                            <input class="form-check-input" type="checkbox" id="two-factor" name="two_factor" {% if settings.two_factor %}checked{% endif %}>
                            <label class="form-check-label" for="two-factor">Enable Two-Factor Authentication</label>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="allowed-ips" class="form-label">Allowed IP Addresses</label>
                        <textarea class="form-control" id="allowed-ips" name="allowed_ips" rows="3" placeholder="Enter IP addresses (one per line)">{{ settings.allowed_ips | join('\n') }}</textarea>
                        <div class="form-text">Leave empty to allow all IPs</div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<div class="row mt-4">
    <!-- Notification Settings -->
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h2 class="card-title">
                    <i class="fas fa-bell"></i>
                    Notification Settings
                </h2>
            </div>
            <div class="card-body">
                <form id="notification-settings">
                    <div class="mb-3">
                        <div class="form-check form-switch">
                            <input class="form-check-input" type="checkbox" id="email-notifications" name="email_notifications" {% if settings.email_notifications %}checked{% endif %}>
                            <label class="form-check-label" for="email-notifications">Enable Email Notifications</label>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="smtp-server" class="form-label">SMTP Server</label>
                        <input type="text" class="form-control" id="smtp-server" name="smtp_server" value="{{ settings.smtp_server }}">
                    </div>
                    <div class="mb-3">
                        <label for="smtp-port" class="form-label">SMTP Port</label>
                        <input type="number" class="form-control" id="smtp-port" name="smtp_port" value="{{ settings.smtp_port }}">
                    </div>
                    <div class="mb-3">
                        <label for="smtp-username" class="form-label">SMTP Username</label>
                        <input type="text" class="form-control" id="smtp-username" name="smtp_username" value="{{ settings.smtp_username }}">
                    </div>
                    <div class="mb-3">
                        <label for="smtp-password" class="form-label">SMTP Password</label>
                        <input type="password" class="form-control" id="smtp-password" name="smtp_password" value="{{ settings.smtp_password }}">
                    </div>
                    <div class="mb-3">
                        <label for="notification-email" class="form-label">Notification Email</label>
                        <input type="email" class="form-control" id="notification-email" name="notification_email" value="{{ settings.notification_email }}">
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Alert Settings -->
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h2 class="card-title">
                    <i class="fas fa-exclamation-circle"></i>
                    Alert Settings
                </h2>
            </div>
            <div class="card-body">
                <form id="alert-settings">
                    <div class="mb-3">
                        <label class="form-label">Alert Thresholds</label>
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label for="critical-threshold" class="form-label">Critical</label>
                                <input type="number" class="form-control" id="critical-threshold" name="critical_threshold" value="{{ settings.critical_threshold }}" min="1">
                            </div>
                            <div class="col-md-6">
                                <label for="high-threshold" class="form-label">High</label>
                                <input type="number" class="form-control" id="high-threshold" name="high_threshold" value="{{ settings.high_threshold }}" min="1">
                            </div>
                            <div class="col-md-6">
                                <label for="medium-threshold" class="form-label">Medium</label>
                                <input type="number" class="form-control" id="medium-threshold" name="medium_threshold" value="{{ settings.medium_threshold }}" min="1">
                            </div>
                            <div class="col-md-6">
                                <label for="low-threshold" class="form-label">Low</label>
                                <input type="number" class="form-control" id="low-threshold" name="low_threshold" value="{{ settings.low_threshold }}" min="1">
                            </div>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Alert Actions</label>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="alert-email" name="alert_email" {% if settings.alert_email %}checked{% endif %}>
                            <label class="form-check-label" for="alert-email">Send Email</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="alert-sms" name="alert_sms" {% if settings.alert_sms %}checked{% endif %}>
                            <label class="form-check-label" for="alert-sms">Send SMS</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="alert-webhook" name="alert_webhook" {% if settings.alert_webhook %}checked{% endif %}>
                            <label class="form-check-label" for="alert-webhook">Send Webhook</label>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="webhook-url" class="form-label">Webhook URL</label>
                        <input type="url" class="form-control" id="webhook-url" name="webhook_url" value="{{ settings.webhook_url }}">
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

{% endblock %}

{% block scripts %}
<script>
const API_KEY = "{{ api_key }}";

// Initialize the page
document.addEventListener('DOMContentLoaded', function() {
    loadSettings();
});

// Load settings from the API
async function loadSettings() {
    try {
        const response = await fetch('/api/settings', {
            headers: {
                'Authorization': `Bearer ${API_KEY}`
            }
        });
        const settings = await response.json();
        populateSettings(settings);
    } catch (error) {
        console.error('Error loading settings:', error);
        showNotification('Error loading settings', 'error');
    }
}

// Populate settings forms
function populateSettings(settings) {
    // General settings
    document.getElementById('system-name').value = settings.system_name;
    document.getElementById('timezone').value = settings.timezone;
    document.getElementById('log-retention').value = settings.log_retention;
    document.getElementById('debug-mode').checked = settings.debug_mode;

    // Security settings
    document.getElementById('api-key').value = settings.api_key;
    document.getElementById('session-timeout').value = settings.session_timeout;
    document.getElementById('two-factor').checked = settings.two_factor;
    document.getElementById('allowed-ips').value = settings.allowed_ips.join('\n');

    // Notification settings
    document.getElementById('email-notifications').checked = settings.email_notifications;
    document.getElementById('smtp-server').value = settings.smtp_server;
    document.getElementById('smtp-port').value = settings.smtp_port;
    document.getElementById('smtp-username').value = settings.smtp_username;
    document.getElementById('smtp-password').value = settings.smtp_password;
    document.getElementById('notification-email').value = settings.notification_email;

    // Alert settings
    document.getElementById('critical-threshold').value = settings.critical_threshold;
    document.getElementById('high-threshold').value = settings.high_threshold;
    document.getElementById('medium-threshold').value = settings.medium_threshold;
    document.getElementById('low-threshold').value = settings.low_threshold;
    document.getElementById('alert-email').checked = settings.alert_email;
    document.getElementById('alert-sms').checked = settings.alert_sms;
    document.getElementById('alert-webhook').checked = settings.alert_webhook;
    document.getElementById('webhook-url').value = settings.webhook_url;
}

// Save all settings
async function saveSettings() {
    try {
        const settings = {
            // General settings
            system_name: document.getElementById('system-name').value,
            timezone: document.getElementById('timezone').value,
            log_retention: parseInt(document.getElementById('log-retention').value),
            debug_mode: document.getElementById('debug-mode').checked,

            // Security settings
            session_timeout: parseInt(document.getElementById('session-timeout').value),
            two_factor: document.getElementById('two-factor').checked,
            allowed_ips: document.getElementById('allowed-ips').value.split('\n').filter(ip => ip.trim()),

            // Notification settings
            email_notifications: document.getElementById('email-notifications').checked,
            smtp_server: document.getElementById('smtp-server').value,
            smtp_port: parseInt(document.getElementById('smtp-port').value),
            smtp_username: document.getElementById('smtp-username').value,
            smtp_password: document.getElementById('smtp-password').value,
            notification_email: document.getElementById('notification-email').value,

            // Alert settings
            critical_threshold: parseInt(document.getElementById('critical-threshold').value),
            high_threshold: parseInt(document.getElementById('high-threshold').value),
            medium_threshold: parseInt(document.getElementById('medium-threshold').value),
            low_threshold: parseInt(document.getElementById('low-threshold').value),
            alert_email: document.getElementById('alert-email').checked,
            alert_sms: document.getElementById('alert-sms').checked,
            alert_webhook: document.getElementById('alert-webhook').checked,
            webhook_url: document.getElementById('webhook-url').value
        };

        const response = await fetch('/api/settings', {
            method: 'PUT',
            headers: {
                'Authorization': `Bearer ${API_KEY}`,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(settings)
        });

        if (response.ok) {
            showNotification('Settings saved successfully', 'success');
        } else {
            throw new Error('Failed to save settings');
        }
    } catch (error) {
        console.error('Error saving settings:', error);
        showNotification('Error saving settings', 'error');
    }
}

// Regenerate API key
async function regenerateApiKey() {
    if (!confirm('Are you sure you want to regenerate the API key? This will invalidate the current key.')) {
        return;
    }

    try {
        const response = await fetch('/api/settings/api-key', {
            method: 'POST',
            headers: {
                'Authorization': `Bearer ${API_KEY}`
            }
        });

        if (response.ok) {
            const data = await response.json();
            document.getElementById('api-key').value = data.api_key;
            showNotification('API key regenerated successfully', 'success');
        } else {
            throw new Error('Failed to regenerate API key');
        }
    } catch (error) {
        console.error('Error regenerating API key:', error);
        showNotification('Error regenerating API key', 'error');
    }
}

// Show notification
function showNotification(message, type = 'info') {
    // TODO: Implement notification system
    console.log(`${type.toUpperCase()}: ${message}`);
}
</script>
{% endblock %}
